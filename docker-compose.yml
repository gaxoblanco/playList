services:
  # Servicio para generar certificados SSL
  # ssl-cert-generator:
  #   image: alpine:latest
  #   command: >
  #     sh -c "
  #       apk add --no-cache openssl &&
  #       mkdir -p /certs &&
  #       openssl req -x509 -nodes -days 365 -newkey rsa:2048 
  #       -keyout /certs/key.pem 
  #       -out /certs/cert.pem 
  #       -subj '/C=ES/ST=State/L=City/O=Organization/CN=localhost'
  #     "
  #   volumes:
  #     - ./ssl:/certs
  #   networks:
  #     - app-network
  # Servicio para la base de datos
  db:
    image: mysql:8.0
    container_name: sora-playlist-db
    restart: always
    volumes:
      - db-data:/var/lib/mysql
      - ./back-end/mysql/init:/docker-entrypoint-initdb.d
    env_file:
      - ./.env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "--password=${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
  # Servicio para phpmyadmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sora-playlist-phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - db
  # Servicio para la API
  sora-playlist-api:
    container_name: sora-playlist-api
    build:
      context: .
      dockerfile: ./back-end/Dockerfile.backend
    volumes:
      - ./back-end:/app
    ports:
      - "5000:5000"
    env_file:
      - ./.env.production
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
    command: gunicorn --bind 0.0.0.0:5000 --timeout 500 app:app
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
  # Servicio para el front-end
  sora-playlist-frontend:
    container_name: sora-playlist-frontend
    build:
      context: ./front-end/spotyPlayList
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
      - "443:443" # Añadir puerto HTTPS
    volumes:
      - ./front-end/spotyPlayList/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Montar certificados SSL
    depends_on:
      - sora-playlist-api
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
  db-data: