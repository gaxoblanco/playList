version: "3.8"

services:
  sora-playlist-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./logs:/app/logs
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    environment:
      - PYTHONUNBUFFERED=1
    command: gunicorn --bind 0.0.0.0:5000 --timeout 500 app:app
    networks:
      - app-network

  sora-playlist-frontend:
    build:
      context: ./front-end/spotyPlayList
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    volumes:
      - ./front-end/spotyPlayList/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sora-playlist-api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge