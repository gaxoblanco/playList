server {
  listen 4200;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    # Le digo a Nginx que intente servir el archivo solicitado ($uri), pero si no lo encuentra, redirija la solicitud a index.html
    try_files $uri $uri/ /index.html;
  }

  # Configuración para la API (backend)
  location /API/ {
    proxy_pass http://sora-playlist:5000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Configuración para manejar archivos estáticos
  location /assets/ {
    try_files $uri =404;
  }
}
