<div class="container">
  <mat-card class="up_img_container">
    <mat-card-header
      [ngClass]="{
        'img-container': true,
        'img-container--selected': imgSelected
      }"
    >
      <div *ngIf="requestTokenSpotify">
        <label *ngIf="!imgSelected" class="file-label" for="file-upload"
          >Subir Imagen</label
        >
        <input
          *ngIf="!imgSelected"
          id="file-upload"
          class="up-img-imput"
          type="file"
          (change)="onFileSelected($event)"
        />
      </div>
      <div *ngIf="loading == 'loading'">
        <p>Loading...</p>
      </div>
      <!-- Contenedor para la imagen -->
      <figure *ngIf="imgSelected && loading == 'done'">
        <img
          class="img-container--selected"
          [src]="imgSelected"
          alt="Imagen seleccionada"
        />
      </figure>
      <!-- span para iniciar secion si aun no tiene token -->
      <span *ngIf="!requestTokenSpotify" class="popap">
        <h2>Para continuar necesitas iniciar sesion</h2>
        <button (click)="login()">Iniciar Sesion</button>
      </span>
    </mat-card-header>

    <mat-chip-set>
      <mat-chip *ngFor="let op of optionList" (click)="selectOption(op)">
        {{ op }}
      </mat-chip>
    </mat-chip-set>
    <mat-chip-set>
      <!-- listado de los nombres de las bandas -->
      <mat-chip *ngFor="let band of bandListCorect">
        {{ band }}
      </mat-chip>
    </mat-chip-set>
  </mat-card>
  <!-- <button mat-flat-button (click)="waitForUserConfirmation()">Continuar</button> -->
  <!-- Lista de las bandas con img -->
  <div class="band-list" *ngIf="bandList.length > 0">
    <mat-card *ngFor="let band of bandList; let i = index" class="band-card">
      <mat-card-header class="band-card--header">
        <button
          class="card-header--button"
          mat-raised-button
          (click)="toggleOptions(i, band.name)"
        >
          <!-- icon de angular material de edit -->
          <mat-icon>edit</mat-icon>
        </button>
        <!-- icon de eliminar -->
        <button class="card-header--button" mat-raised-button>
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-header>
      <div class="band-inf--container">
        <figure>
          <img class="band-image" [src]="band.img" [alt]="band.name" />
        </figure>
        <mat-card-header
          class="band-card--footer"
          [ngClass]="{
            ' footer--active': activeCardIndex === i,
            ' footer--inactive': activeCardIndex !== i
          }"
        >
          <mat-card-title class="band-card--title">{{
            band.name
          }}</mat-card-title>
          <mat-card-subtitle
            class="scrollable-container"
            *ngIf="band.genres!.length > 0"
          >
            <span class="genre-label" *ngFor="let genre of band.genres">{{
              genre
            }}</span>
          </mat-card-subtitle>
        </mat-card-header>
      </div>
      <div
        *ngIf="activeCardIndex === i"
        @toggleOptions
        class="band-list-options"
      >
        <app-options-list
          *ngFor="let band of optionsBand"
          [band]="band"
        ></app-options-list>
      </div>
    </mat-card>
  </div>
</div>
