<div
  class="container--up_img"
  [ngClass]="{
    'double-column': imgSelected && step !== 3 && loading === 'done',
  }"
>
  <!-- you see up_img_container if step !== 3 -->
  <div class="up_img_container" *ngIf="step !== 3">
    <mat-card-header
      [ngClass]="{
        'img-container': true,
        'img-container--selected': imgSelected && loading !== 'error',
      }"
    >
      <div *ngIf="requestTokenSpotify">
        <label
          *ngIf="!imgSelected"
          class="file-label pulse"
          for="file-upload"
          >{{ uploadImageText }}</label
        >
        <input
          *ngIf="!imgSelected"
          id="file-upload"
          class="up-img-imput"
          type="file"
          (change)="onFileSelected($event)"
        />
      </div>
      <!-- Contenedor para la imagen -->
      <figure class="image-figure" *ngIf="imgSelected && loading != 'loading'">
        <img
          #imgRef
          id="up_img_container"
          class="img-container--selected"
          [src]="imgSelected"
          alt="Imagen seleccionada"
        />
        <!-- Pointer in img -->
        <div
          class="moving-circle"
          [ngStyle]="{
            'top.px': boxY - 12,
            'left.px': boxX - 12,
            'border-color': colorPointer
          }"
        ></div>
      </figure>
      <!-- span to start section if you don't login -->
      <span *ngIf="!requestTokenSpotify" class="popap">
        <h2>Para continuar necesitas iniciar sesion</h2>
        <button (click)="login()">Iniciar Sesion</button>
      </span>
    </mat-card-header>
    <!-- container error -->
    <app-error-container
      *ngIf="loading == 'error'"
      [loading]="loading"
      [step]="step"
      [imgSelected]="imgSelected"
      [errorMessages]="currentErrors"
      (trayAgain)="trayAgain()"
      (trayAgainStep1)="trayAgainStep1()"
      (trayAgainStep2)="trayAgainStep2()"
    ></app-error-container>
  </div>
  <!-- Botón para recortar y enviar la imagen -->
  <button
    class="button--crop pulse"
    id="confirmCropButton"
    *ngIf="imgSelected && bandListCards.length == 0 && loading == 'up'"
    (click)="waitForCrop()"
  >
    {{cutSendImageText}}
  </button>
  <!-- Spinner to search bandErrorList -->
  <div class="loading" *ngIf="loading == 'loading' && step == 0">
    <mat-spinner></mat-spinner>
  </div>
  <!-- Primer paso - seleccionar opciones de nombres correcto -->
  <div
    *ngIf="imgSelected && loading == 'done' && bandListCards.length == 0"
    class="game_corrector--container"
  >
    <div class="select_option--container">
      <mat-chip *ngFor="let op of optionList" (click)="selectOption(op)">
        {{ op }}
      </mat-chip>
    </div>
    <div>
      <form
        (ngSubmit)="onSubmitUserBandName()"
        class="select_option--user_band_name"
      >
        <input
          matInput
          placeholder="Enter your option"
          [(ngModel)]="userBandName"
          name="userBandName"
          required
        />
        <button mat-raised-button type="submit">Add band</button>
      </form>
    </div>
    <mat-chip-set>
      <mat-chip (click)="waitForUserConfirmation()" class="button--discard">
        Discard this group of options
      </mat-chip>
    </mat-chip-set>
    <!-- span to succes onSubmitUserBandName + userBandaName -->
    <span
      *ngIf="showSuccessMessage"
      class="span-user_band_name"
      aria-live="polite"
    >
      Band add : <mat-chip>{{ $userBandName }}</mat-chip>
    </span>
  </div>
  <!-- container error -->

  <!-- spinner to loading -->
  <div *ngIf="loading == 'loading' && step == 1">
    <mat-spinner></mat-spinner>
  </div>

  <!-- Step to see the different bands and  correct errors -->
  <div *ngIf="step == 1 && loading == 'done'">
    <!-- <span class="info--container">
      <h3>
        Selecciona las bandas que no corresponden y corrigelas antes de generar
        la play list
      </h3>
    </span> -->
    <!-- <button mat-flat-button (click)="waitForUserConfirmation()">Continuar</button> -->
    <!-- Lista de las bandas con img -->
    <!-- Responsive card components -->
    <ng-container *ngIf="!isMobile">
      <!-- Desktop version -->
      <app-card-band
        [bandList]="bandListCards"
        (hoverPosition)="updatePointerPosition($event)"
      ></app-card-band>
    </ng-container>

    <ng-container *ngIf="isMobile">
      <!-- Mobile version -->
      <app-card-band-mobile
        style="display: flex; flex-direction: column; flex: 1; margin-top: 20px"
        [bandList]="bandListCards"
        (hoverPosition)="updatePointerPosition($event)"
      ></app-card-band-mobile>
    </ng-container>
    <!-- Nombra y envia a generar la play list -->
    <div class="create_playlist--container">
      <form
        *ngIf="step == 1 && loading == 'done'"
        (ngSubmit)="createPlayList()"
        class="form_create_playlist pulse"
      >
        <input
          matInput
          placeholder="Enter your option"
          [(ngModel)]="playListName"
          name="userBandName"
          required
        />
        <button mat-raised-button type="submit">
          <p style="margin: 0; display: flex">
            Create
            <!-- Componente de Icon: Icono SVG -->
            <svg class="icon" viewBox="0 0 24 24">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"
              ></path>
            </svg>
          </p>
        </button>
      </form>
    </div>
  </div>

  <app-playlistinfo
    [playlistInfo]="playlistInfo"
    [step]="step"
  ></app-playlistinfo>
</div>
