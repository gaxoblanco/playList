<div
  class="container--up_img"
  [ngClass]="{
    'double-column': imgSelected
  }"
>
  <div class="up_img_container">
    <mat-card-header
      [ngClass]="{
        'img-container': true,
        'img-container--selected': imgSelected
      }"
    >
      <div *ngIf="requestTokenSpotify">
        <label *ngIf="!imgSelected" class="file-label" for="file-upload"
          >Subir Imagen</label
        >
        <input
          *ngIf="!imgSelected"
          id="file-upload"
          class="up-img-imput"
          type="file"
          (change)="onFileSelected($event)"
        />
      </div>
      <div *ngIf="loading == 'loading'">
        <p>Loading...</p>
      </div>
      <!-- Contenedor para la imagen -->
      <figure class="image-figure" *ngIf="imgSelected && loading == 'done'">
        <img
          #imgRef
          class="img-container--selected"
          [src]="imgSelected"
          alt="Imagen seleccionada"
        />
        <!-- Círculo amarillo -->
        <div
          class="moving-circle"
          [ngStyle]="{
            'top.px': circleY - 12,
            'left.px': circleX - 12
          }"
        ></div>
      </figure>
      <!-- span para iniciar secion si aun no tiene token -->
      <span *ngIf="!requestTokenSpotify" class="popap">
        <h2>Para continuar necesitas iniciar sesion</h2>
        <button (click)="login()">Iniciar Sesion</button>
      </span>
    </mat-card-header>
  </div>
  <!-- Primer paso - seleccionar opciones de nombres correcto -->
  <div
    *ngIf="imgSelected && loading == 'done' && bandListCards.length == 0"
    class="game_corrector--container"
  >
    <mat-chip-grid class="select_option--container">
      <mat-chip *ngFor="let op of optionList" (click)="selectOption(op)">
        {{ op }}
      </mat-chip>
    </mat-chip-grid>
    <mat-chip-set>
      <mat-chip (click)="waitForUserConfirmation()" class="button--discard">
        Descartar este grupo de opciones
      </mat-chip>
    </mat-chip-set>
  </div>
  <div *ngIf="step == 1">
    <!-- second Step - borrar y correguir bandas -->
    <mat-chip-grid class="info--container">
      <h3>
        Selecciona las bandas que no corresponden y corrigelas antes de generar
        la play list
      </h3>
    </mat-chip-grid>
    <!-- <button mat-flat-button (click)="waitForUserConfirmation()">Continuar</button> -->
    <!-- Lista de las bandas con img -->
    <app-card-band
      [bandList]="bandListCards"
      (hoverPosition)="updatePointerPosition($event)"
    ></app-card-band>
  </div>
</div>
