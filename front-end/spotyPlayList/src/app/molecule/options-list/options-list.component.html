<!-- button para cargar la banda correcta -->
<mat-card class="band-card--option" (click)="changBand(index)">
  <div class="band-card-content">
    <mat-card-header>
      <figure class="band-card-option--figure" mat-card-avatar>
        <img class="band-image" [src]="band.img" alt="{{ band.name }}" />
      </figure>
      <mat-card-title class="band-card--title">{{ band.name }}</mat-card-title>
    </mat-card-header>
  </div>
</mat-card>
