<section class="workflow-container">
  <!-- Línea en el fondo -->
  <div class="workflow-path"></div>

  <!-- Tarjeta de audio -->
  <div class="workflow-step audio-step">
    <div class="audio-card">
      <div class="audio-card-content">
          <div class="audio-card-header">
            <div class="audio-icon pulse" (click)="toggleAudio()">
              <svg class="icon" viewBox="0 0 24 24">
                <path *ngIf="!isPlaying" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"></path>
                <path *ngIf="isPlaying" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
              </svg>
            </div>
            <div class="audio-text">
                <h3>Escucha cómo funciona LineUp Playlist</h3>
                <p>Reproducir esta introducción de audio para entender rápidamente cómo usar nuestra app.</p>
            </div>
          </div>
          <div class="audio-controls">
            <audio #audioPlayer controls>
              <source src="assets/sound/LineUp.wav" type="audio/mpeg">
                Tu navegador no soporta el elemento de audio.
            </audio>
          </div>
      </div>
    </div>
  </div>

  <app-step-section
    *ngFor="let step of steps; let i = index"
    [title]="step.title"
    [parrafo]="step.parrafo"
    [opciones]="step.opciones"
    [imageSrc]="step.imageSrc"
    [imageAlt]="step.imageAlt"
    [iconRef]="step.iconRef"
    [isOdd]="i % 2 === 0"
  ></app-step-section>
</section>
